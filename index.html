<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle Clicker Game</title>

    <link rel="icon" href="assets/favicon.png">

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    >

    <style>
        body {
            background: #121212;
            color: white;
            font-family: Arial, sans-serif;
        }

        #header {
            background: #1f1f1f;
            padding: 15px;
            margin-bottom: 20px;
            align-items: center;
        }

        #header img {
            width: 60px;
            height: 60px;
        }

        .game-card {
            background: #1e1e1e;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .money-display {
            font-size: 40px;
            font-weight: bold;
            color: #00ff99;
        }

        .btn-game {
            margin-top: 10px;
        }

        .shop-item {
            margin-bottom: 10px;
        }

        #console {
            background: black;
            color: lime;
            resize: none;
        }

        .avatar-img {
            width: 150px;
            border-radius: 10px;
        }

        .achievement {
            width: 60px;
            margin: 5px;
            filter: grayscale(100%);
        }

        .achievement.unlocked {
            filter: grayscale(0%);
        }

        .theme-btn {
            cursor: pointer;
            width: 60px;
            margin: 5px;
        }
    </style>
</head>

<body>

<div class="container-fluid">

    <div class="row" id="header">
        <div class="col-auto">
            <img src="assets/favicon.png" alt="Game Logo" class="img-fluid rounded-circle">
        </div>

        <div class="col">
            <h2>Idle Clicker Game</h2>
        </div>

        <div class="col text-right">
            <span id="clock"></span>
        </div>
    </div>

    <div class="row">

        <div class="col-lg-3">

            <div class="game-card text-center">

                <h4 id="playerName">Player: Guest</h4>

                <button
                    class="btn btn-warning btn-sm"
                    data-toggle="modal"
                    data-target="#nameModal"
                >
                    Change Name
                </button>

                <hr>

                <img
                    src="assets/avatar/avatar0big.png"
                    alt="Avatar"
                    class="avatar-img img-fluid"
                    id="avatarImage"
                >

                <p class="mt-2">Default Avatar</p>

            </div>

            <div class="game-card">

                <h5>Stats</h5>

                <p>Total Clicks: <span id="totalClicks">0</span></p>
                <p>Click Power: <span id="clickPower">1</span></p>
                <p>Autoclickers: <span id="autoclickers">0</span></p>
                <p>Total Money: $<span id="totalMoney">0</span></p>

            </div>

            <div class="game-card">

                <h5>Achievements</h5>

                <img src="assets/achievements/achievement_0big.png" class="achievement" id="achievement1" alt="Achievement">
                <img src="assets/achievements/achievement_1big.png" class="achievement" id="achievement2" alt="Achievement">
                <img src="assets/achievements/achievement_2big.png" class="achievement" id="achievement3" alt="Achievement">

            </div>

        </div>

        <div class="col-lg-6">

            <div class="game-card text-center">

                <h3>Your Money</h3>

                <div class="money-display">
                    $<span id="money">0</span>
                </div>

                <button
                    class="btn btn-primary btn-lg btn-block btn-game"
                    id="moneyButton"
                >
                    Make Money (+$1)
                </button>

                <button
                    class="btn btn-success btn-game"
                    id="saveBtn"
                >
                    Save Game
                </button>

                <button
                    class="btn btn-secondary btn-game"
                    id="loadBtn"
                >
                    Load Game
                </button>

            </div>

            <div class="game-card">

                <h5>Console</h5>

                <textarea
                    id="console"
                    class="form-control"
                    rows="6"
                    disabled
                >Game Started...</textarea>

            </div>

        </div>

        <div class="col-lg-3">

            <div class="game-card">

                <h4>Shop</h4>

                <button
                    class="btn btn-info btn-block shop-item"
                    id="buyAutoclicker"
                >
                    Buy Autoclicker ($10)
                </button>

                <button
                    class="btn btn-warning btn-block shop-item"
                    id="upgradePower"
                >
                    Upgrade Click Power ($50)
                </button>

            </div>

            <div class="game-card text-center">

                <h5>Themes</h5>

                <img
                    src="assets/themeicon1.png"
                    class="theme-btn"
                    alt="Default Theme"
                    onclick="setTheme('dark')"
                >

                <img
                    src="assets/themeicon2.png"
                    class="theme-btn"
                    alt="Light Theme"
                    onclick="setTheme('light')"
                >

            </div>

        </div>

    </div>

</div>

<div
    class="modal fade"
    id="nameModal"
    tabindex="-1"
    role="dialog"
>
    <div class="modal-dialog modal-dialog-centered" role="document">

        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Change Name</h5>

                <button
                    type="button"
                    class="close"
                    data-dismiss="modal"
                >
                    <span>&times;</span>
                </button>
            </div>

            <div class="modal-body">

                <input
                    type="text"
                    class="form-control"
                    id="nameInput"
                    placeholder="Enter your name"
                >

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-primary"
                    id="saveName"
                    data-dismiss="modal"
                >
                    Save
                </button>

            </div>

        </div>

    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>

<script>
    let money = 0;
    let clickPower = 1;
    let totalClicks = 0;
    let autoclickers = 0;

    const moneyEl = document.getElementById("money");
    const clickPowerEl = document.getElementById("clickPower");
    const totalClicksEl = document.getElementById("totalClicks");
    const autoclickersEl = document.getElementById("autoclickers");
    const totalMoneyEl = document.getElementById("totalMoney");
    const consoleEl = document.getElementById("console");

    function updateUI() {
        moneyEl.innerText = money;
        clickPowerEl.innerText = clickPower;
        totalClicksEl.innerText = totalClicks;
        autoclickersEl.innerText = autoclickers;
        totalMoneyEl.innerText = money;
    }

    function log(message) {
        consoleEl.value += "\n" + message;
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    document.getElementById("moneyButton").addEventListener("click", () => {
        money += clickPower;
        totalClicks++;

        if (totalClicks >= 10) {
            document.getElementById("achievement1").classList.add("unlocked");
        }

        updateUI();
    });

    document.getElementById("buyAutoclicker").addEventListener("click", () => {
        if (money >= 10) {
            money -= 10;
            autoclickers++;
            log("Bought an autoclicker");
            updateUI();
        } else {
            alert("Not enough money");
        }
    });

    document.getElementById("upgradePower").addEventListener("click", () => {
        if (money >= 50) {
            money -= 50;
            clickPower++;
            log("Click power upgraded");
            updateUI();
        } else {
            alert("Not enough money");
        }
    });

    setInterval(() => {
        money += autoclickers;
        updateUI();
    }, 1000);

    document.getElementById("saveBtn").addEventListener("click", () => {

        const gameData = {
            money,
            clickPower,
            totalClicks,
            autoclickers
        };

        localStorage.setItem("idleGameSave", JSON.stringify(gameData));

        log("Game saved");
    });

    document.getElementById("loadBtn").addEventListener("click", () => {

        const saveData = JSON.parse(localStorage.getItem("idleGameSave"));

        if (saveData) {
            money = saveData.money;
            clickPower = saveData.clickPower;
            totalClicks = saveData.totalClicks;
            autoclickers = saveData.autoclickers;

            updateUI();

            log("Game loaded");
        } else {
            alert("No save found");
        }
    });

    document.getElementById("saveName").addEventListener("click", () => {

        const newName = document.getElementById("nameInput").value.trim();

        if (newName !== "") {
            document.getElementById("playerName").innerText =
                "Player: " + newName;
        }
    });

    function setTheme(mode) {

        if (mode === "light") {
            document.body.style.background = "#f5f5f5";
            document.body.style.color = "#111";
        } else {
            document.body.style.background = "#121212";
            document.body.style.color = "white";
        }
    }

    function updateClock() {
        const now = new Date();

        document.getElementById("clock").innerText =
            now.toLocaleTimeString();
    }

    setInterval(updateClock, 1000);

    updateClock();
    updateUI();
</script>

</body>
</html>
